<div id="createUserModal" class="modal-overlay" style="display: none;">
    <div class="modal">
        <div class="modal-header">
            <h2>Agregar Nuevo Usuario</h2>
            <button class="modal-close" onclick="closeModal('createUserModal')">&times;</button>
        </div>
        <div class="modal-body">
            <form id="createUserForm">
                {% csrf_token %}
                <div class="form-group">
                    <label for="userRole">Rol <span class="required">*</span></label>
                    <select id="userRole" required>
                        <option value="">Seleccionar rol</option>
                        <option value="usuario">Usuario</option>
                        <option value="administrador">Administrador</option>
                    </select>
                </div>

                <!-- Campos para Usuario -->
                <div id="usuarioFields" class="additional-fields">
                    <div class="form-group full-width">
                        <label for="userEmail">Correo Electrónico <span class="required">*</span></label>
                        <input type="email" id="userEmail" placeholder="Ej: manuelav329@gmail.com">
                    </div>
                    <div class="form-group">
                        <label for="userPassword">Contraseña <span class="required">*</span></label>
                        <input type="password" id="userPassword" placeholder="Mínimo 8 caracteres">
                    </div>
                    <div class="form-group">
                        <label for="userPasswordConfirm">Confirmar Contraseña <span class="required">*</span></label>
                        <input type="password" id="userPasswordConfirm" placeholder="Repite la Contraseña">
                    </div>
                </div>

                <!-- Campos para Administrador -->
                <div id="adminFields" class="additional-fields">
                    <div class="form-group">
                        <label for="adminName">Nombre <span class="required">*</span></label>
                        <input type="text" id="adminName" placeholder="Ej: Manuela">
                    </div>
                    <div class="form-group">
                        <label for="adminLastName">Apellido <span class="required">*</span></label>
                        <input type="text" id="adminLastName" placeholder="Ej: Vasquez Herrera">
                    </div>
                    <div class="form-group full-width">
                        <label for="adminEmail">Correo Electrónico <span class="required">*</span></label>
                        <input type="email" id="adminEmail" placeholder="Ej: correo@gmail.com">
                    </div>
                    <div class="form-group full-width">
                        <label for="adminPhone">Teléfono <span class="required">*</span></label>
                        <input type="tel" id="adminPhone" placeholder="Ingrese el número">
                    </div>
                    <div class="form-group">
                        <label for="adminPassword">Contraseña <span class="required">*</span></label>
                        <input type="password" id="adminPassword" placeholder="Ingrese una contraseña">
                    </div>
                    <div class="form-group">
                        <label for="adminPasswordConfirm">Confirmar Contraseña <span class="required">*</span></label>
                        <input type="password" id="adminPasswordConfirm" placeholder="Repite la Contraseña">
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal('createUserModal')">Cancelar</button>
                    <button type="button" class="btn-primary" onclick="createUser()">➕ Crear Usuario</button>
                </div>
            </form>
        </div>
    </div>
</div>
